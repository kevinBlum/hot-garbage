name: Build Game

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: write

env:
  GODOT_VERSION: "4.7"

jobs:
  export:
    name: Export (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            preset: Linux
            output: exports/linux/hot-garbage.x86_64
          - name: Windows
            preset: Windows Desktop
            output: exports/windows/hot-garbage.exe
          - name: macOS
            preset: macOS
            output: exports/macos/hot-garbage.zip

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          persist-credentials: false

      - name: Cache export templates
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: ~/.local/share/godot/export_templates
          key: godot-${{ env.GODOT_VERSION }}-stable-export-templates

      - name: Install Godot system dependencies
        run: sudo apt-get install -y --no-install-recommends libgl1 libxi6 libxrandr2 libxcursor1 libxinerama1

      - name: Download Godot ${{ env.GODOT_VERSION }}
        run: |
          wget -q -O godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q godot.zip
          sudo install -m 755 "Godot_v${GODOT_VERSION}-stable_linux.x86_64" /usr/local/bin/godot

      - name: Download export templates
        run: |
          TEMPLATES_DIR="${HOME}/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          if [ ! -f "${TEMPLATES_DIR}/windows_release_x86_64.exe" ]; then
            echo "Downloading export templates..."
            wget -q -O templates.tpz \
              "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
            mkdir -p "${TEMPLATES_DIR}"
            unzip -q templates.tpz
            mv templates/* "${TEMPLATES_DIR}/"
            rmdir templates
          else
            echo "Using cached export templates."
          fi

      - name: Create output directories
        run: mkdir -p hot-garbage-godot/exports/{linux,windows,macos}

      - name: Export — ${{ matrix.name }}
        run: |
          godot --headless \
            --path "$PWD/hot-garbage-godot" \
            --export-release "${{ matrix.preset }}" \
            "$PWD/hot-garbage-godot/${{ matrix.output }}"

      - name: Verify export output
        run: |
          if [ ! -f "hot-garbage-godot/${{ matrix.output }}" ]; then
            echo "::error::Export produced no output at hot-garbage-godot/${{ matrix.output }}"
            exit 1
          fi
          ls -lh "hot-garbage-godot/${{ matrix.output }}"

      - name: Package for upload
        run: |
          mkdir -p dist
          case "${{ matrix.name }}" in
            Linux)
              chmod +x "hot-garbage-godot/${{ matrix.output }}"
              tar -czf dist/hot-garbage-linux.tar.gz \
                -C hot-garbage-godot/exports/linux hot-garbage.x86_64
              ;;
            Windows)
              cp "hot-garbage-godot/${{ matrix.output }}" dist/hot-garbage-windows.exe
              ;;
            macOS)
              cp "hot-garbage-godot/${{ matrix.output }}" dist/hot-garbage-macos.zip
              ;;
          esac

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.name }}
          path: dist/
          if-no-files-found: error

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: export
    if: github.ref_type == 'tag'

    steps:
      - name: Download all platform artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          path: artifacts
          merge-multiple: false

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "${TAG}" \
            --repo "${{ github.repository }}" \
            --title "Hot Garbage ${TAG}" \
            --generate-notes \
            artifacts/Linux/hot-garbage-linux.tar.gz \
            artifacts/Windows/hot-garbage-windows.exe \
            artifacts/macOS/hot-garbage-macos.zip
